<!DOCTYPE html>
<html>

<head>

<title>Explorează - Pixora</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}


/* MENIU */

.meniu {
    background: white;
    padding: 12px 25px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 3px 10px #ddd;
    position: sticky;
    top: 0;
}


.brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: bold;
}


.brand img {
    width: 40px;
    height: 40px;
    border-radius: 10px;
}


.linkuri {
    display: flex;
    gap: 25px;
}


.linkuri a {
    text-decoration: none;
    color: black;
    font-weight: bold;
}


.linkuri a:hover {
    color: #777;
}


/* TITLU */

h1 {
    text-align: center;
    margin-top: 30px;
}


/* CATEGORII */

.categorii {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}


.categorii button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    cursor: pointer;
    font-weight: bold;
}


.categorii button:hover {
    background: #ddd;
}


/* GALERIE */

.galerie {

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 20px;

}


.galerie img {

    width: 100%;
    border-radius: 15px;
    transition: 0.3s;

}


.galerie img:hover {

    transform: scale(1.05);

}


</style>

</head>


<body>


<div class="meniu">


<div class="brand">

<img src="logo.png">

<span>Pixora</span>

</div>


<div class="linkuri">

<a href="index.html">Acasă</a>

<a href="exploreaza.html">Explorează</a>

<a href="categorii.html">Categorii</a>

<a href="profil.html">Profil</a>

</div>


</div>



<h1>Explorează Pixora</h1>



<div class="categorii">

<button>Natură</button>
<button>Mașini</button>
<button>Animale</button>
<button>Orașe</button>
<button>Artă</button>

</div>



<div class="galerie">


<img src="https://picsum.photos/300/400">

<img src="https://picsum.photos/300/350">

<img src="https://picsum.photos/300/450">

<img src="https://picsum.photos/300/300">

<img src="https://picsum.photos/300/500">

<img src="https://picsum.photos/300/380">


</div>



</body>

</html>
