<!DOCTYPE html>
<html>

<head>

<title>Explorează - Pixora</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}


/* MENIU */

.meniu {
    background: white;
    padding: 12px 25px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 3px 10px #ccc;
}


.brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: bold;
}


.brand img {
    width: 40px;
    height: 40px;
    border-radius: 10px;
}


.linkuri {
    display: flex;
    gap: 25px;
}


.linkuri a {
    text-decoration: none;
    color: black;
    font-weight: bold;
}


/* TITLU */

h1 {
    text-align: center;
    margin: 30px;
}


/* CATEGORII */

.categorii {
    text-align: center;
}


.categorii button {
    padding: 12px 20px;
    margin: 5px;
    border: none;
    border-radius: 25px;
    background: white;
    cursor: pointer;
    font-weight: bold;
}


.categorii button:hover {
    background: black;
    color: white;
}


/* GALERIE */

.galerie {

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 25px;

}


.card {

    overflow: hidden;
    border-radius: 20px;
}


.card img {

    width: 100%;
    display: block;
    border-radius: 20px;
    transition: transform 0.5s, box-shadow 0.5s;

}


.card img:hover {

    transform: scale(1.15);
    box-shadow: 0 10px 25px #999;

}


</style>

</head>


<body>


<div class="meniu">

<div class="brand">

<img src="logo.png">

<span>Pixora</span>

</div>


<div class="linkuri">

<a href="index.html">Acasă</a>

<a href="exploreaza.html">Explorează</a>

<a href="categorii.html">Categorii</a>

<a href="profil.html">Profil</a>

</div>

</div>



<h1>Explorează Pixora</h1>



<div class="categorii">

<button>Natură</button>
<button>Mașini</button>
<button>Animale</button>
<button>Orașe</button>
<button>Artă</button>

</div>



<div class="galerie">


<div class="card">
<img src="https://picsum.photos/400/500">
</div>


<div class="card">
<img src="https://picsum.photos/400/450">
</div>


<div class="card">
<img src="https://picsum.photos/400/600">
</div>


<div class="card">
<img src="https://picsum.photos/400/550">
</div>


<div class="card">
<img src="https://picsum.photos/400/480">
</div>


<div class="card">
<img src="https://picsum.photos/400/520">
</div>


</div>



</body>

</html>
