<style>

body {
    font-family: Arial;
    background:#f5f5f5;
    margin:0;
}


.meniu {
    background:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 10px #ccc;
}


.brand {
    display:flex;
    align-items:center;
    gap:10px;
    font-size:24px;
    font-weight:bold;
}


.brand img {
    width:45px;
    height:45px;
    border-radius:12px;
}


.meniu a {
    text-decoration:none;
    color:black;
    font-weight:bold;
    margin-left:20px;
}


.logo {
    display:block;
    width:100px;
    height:100px;
    margin:30px auto;
    border-radius:20px;
}


h1 {
    text-align:center;
}


.galerie {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:25px;
}


.card {
    overflow:hidden;
    border-radius:20px;
}


.card img {
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:20px;
    transition:0.5s;
}


.card img:hover {
    transform:scale(1.12);
}


</style>
