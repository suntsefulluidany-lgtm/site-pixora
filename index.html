<!DOCTYPE html>
<html>

<head>

<meta name="google-site-verification" content="Zy26sVHqGsVihPNt9AhhdQSf7JMUUpFJBqFTtTEDBuo">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4990811750293516"
crossorigin="anonymous"></script>

<link rel="icon" type="image/png" href="logo.png">

<title>Pixora - Imagini și Categorii</title>

<meta name="description" content="Pixora este o galerie de imagini cu natură, mașini, animale și artă. Explorează imagini interesante.">


<style>

body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}


.meniu {
    background: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 3px 10px #ccc;
}


.brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 24px;
    font-weight: bold;
}


.brand img {
    width: 45px;
    height: 45px;
    border-radius: 12px;
}


.meniu a {
    text-decoration: none;
    color: black;
    font-weight: bold;
    margin-left: 20px;
}


h1 {
    text-align: center;
    margin: 30px;
}


.logo {
    width: 100px;
    height: 100px;
    display: block;
    margin: 25px auto;
    border-radius: 20px;
}


#cautare {

    display: block;
    margin: 20px auto;
    width: 80%;
    padding: 12px;
    border-radius: 20px;
    border: 1px solid #ccc;
    font-size: 16px;

}



.galerie {

    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
    padding: 25px;

}



.card {

    overflow: hidden;
    border-radius: 20px;

}


.card img {

    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 20px;
    transition: 0.5s;

}


.card img:hover {

    transform: scale(1.12);

}


</style>

</head>


<body>


<div class="meniu">


<div class="brand">

<img src="logo.png">

<span>Pixora</span>

</div>


<div>

<a href="index.html">Acasă</a>
<a href="exploreaza.html">Explorează</a>
<a href="categorii.html">Categorii</a>
<a href="profil.html">Profil</a>

</div>


</div>



<img src="logo.png" class="logo">


<h1>Pixora 📸</h1>


<input id="cautare" placeholder="Caută imagini...">



<div class="galerie">


<div class="card">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e">
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131">
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1549490349-8643362247b5">
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7">
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1456926631375-92c8ce872def">
</div>


</div>



<script>

let cautare = document.getElementById("cautare");

cautare.onkeyup = function(){

let text = cautare.value.toLowerCase();

let imagini = document.querySelectorAll(".galerie img");


imagini.forEach(function(img){

if(text==""){
img.style.display="block";
}
else{
img.style.display="none";
}

});


}

</script>



</body>

</html>
