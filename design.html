<!DOCTYPE html>
<html>

<head>

<title>Design - Pixora</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}


/* MENIU */

.meniu {
    background: white;
    padding: 12px 25px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 3px 10px #ccc;
}


.brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: bold;
}


.brand img {
    width: 40px;
    height: 40px;
    border-radius: 10px;
}


.linkuri {
    display: flex;
    gap: 25px;
}


.linkuri a {
    text-decoration: none;
    color: black;
    font-weight: bold;
}


.linkuri a:hover {
    color: #777;
}



/* TITLU */

h1 {
    text-align: center;
    margin: 30px;
}



/* GALERIE */

.galerie {

    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
    padding: 25px;

}


.card {

    overflow: hidden;
    border-radius: 20px;

}


.card img {

    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 20px;
    transition: 0.5s;

}


.card img:hover {

    transform: scale(1.12);
    box-shadow: 0 10px 25px #999;

}


</style>

</head>


<body>


<div class="meniu">


<div class="brand">

<img src="logo.png">

<span>Pixora</span>

</div>

</div>


</div>
